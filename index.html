<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fake STRAVA</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Leaflet CSS & JS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <!-- Leaflet Routing Machine CSS & JS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.css" />
    <script src="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.js"></script>

    <!-- Turf.js para interpolação de pontos GPS -->
    <script src="https://cdn.jsdelivr.net/npm/@turf/turf@6/turf.min.js"></script>

    <style>
        .leaflet-routing-container { display: none !important; }
        #map { cursor: crosshair; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>

<body class="bg-gray-50 text-gray-800 font-sans h-screen flex flex-col md:flex-row overflow-hidden">

    <!-- Painel Lateral -->
    <aside class="w-full md:w-96 bg-white shadow-xl z-10 flex flex-col h-1/2 md:h-full overflow-y-auto">
        <div class="p-6 flex-grow flex flex-col space-y-6">

            <!-- Cabeçalho -->
            <div>
                <h1 class="text-3xl font-bold text-indigo-600 flex items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 2v20" />
                        <path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6" />
                    </svg>
                    Fake Strava
                </h1>
                <p class="text-sm text-gray-500 mt-1">Crie rotas falsas e exporte para GPX.</p>
            </div>

            <!-- Instruções -->
            <div class="bg-indigo-50 border border-indigo-100 rounded-lg p-4 text-sm text-indigo-800">
                <ol class="list-decimal ml-4 space-y-1">
                    <li>Clique no mapa para criar pontos de passagem.</li>
                    <li>Configure a data, ritmo e biometria.</li>
                    <li>Publique no Strava ou Baixe o GPX.</li>
                </ol>
            </div>

            <!-- Formulário -->
            <div class="space-y-4">
                <!-- Busca de Localidade -->
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Pesquisar Localidade</label>
                    <div class="flex gap-2">
                        <input type="text" id="searchInput" placeholder="Ex: Parque das Nações, Lisboa"
                            class="w-full px-3 py-2 border border-gray-300 rounded-md focus:ring-indigo-500 focus:border-indigo-500 outline-none"
                            onkeypress="if(event.key === 'Enter') searchLocation()">
                        <button onclick="searchLocation()"
                            class="bg-indigo-100 hover:bg-indigo-200 text-indigo-700 px-3 py-2 rounded-md transition-colors flex items-center justify-center"
                            title="Pesquisar">
                            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
                                fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                stroke-linejoin="round">
                                <circle cx="11" cy="11" r="8" />
                                <line x1="21" y1="21" x2="16.65" y2="16.65" />
                            </svg>
                        </button>
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Nome da Atividade</label>
                    <input type="text" id="activityName" value="Corrida Matinal"
                        class="w-full px-3 py-2 border border-gray-300 rounded-md focus:ring-indigo-500 focus:border-indigo-500 outline-none">
                </div>

                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Descrição do Treino</label>
                    <textarea id="activityDescription" rows="2" placeholder="Como foi a atividade? (Aparecerá no Strava)"
                        class="w-full px-3 py-2 border border-gray-300 rounded-md focus:ring-indigo-500 focus:border-indigo-500 outline-none resize-none"></textarea>
                </div>
                
                <div class="grid grid-cols-2 gap-2 mt-1 mb-2 border-b border-gray-200 pb-4">
                    <div class="flex items-center">
                        <input type="checkbox" id="isCommute" class="h-4 w-4 text-indigo-600 focus:ring-indigo-500 border-gray-300 rounded cursor-pointer">
                        <label for="isCommute" class="ml-2 block text-xs text-gray-700 cursor-pointer">Trajeto (Commute)</label>
                    </div>
                    <div class="flex items-center">
                        <input type="checkbox" id="isTrainer" class="h-4 w-4 text-indigo-600 focus:ring-indigo-500 border-gray-300 rounded cursor-pointer">
                        <label for="isTrainer" class="ml-2 block text-xs text-gray-700 cursor-pointer">Treino Indoor (Rolo)</label>
                    </div>
                    <div class="flex items-center col-span-2">
                        <input type="checkbox" id="hideHR" class="h-4 w-4 text-indigo-600 focus:ring-indigo-500 border-gray-300 rounded cursor-pointer" onchange="document.getElementById('heartRate').disabled = this.checked; document.getElementById('hrVariation').disabled = this.checked; if(this.checked) { document.getElementById('heartRate').classList.add('opacity-50'); } else { document.getElementById('heartRate').classList.remove('opacity-50'); }">
                        <label for="hideHR" class="ml-2 block text-xs text-gray-700 cursor-pointer">Ocultar Batimentos Cardíacos</label>
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Data e Hora de Início</label>
                    <input type="datetime-local" id="startTime"
                        class="w-full px-3 py-2 border border-gray-300 rounded-md focus:ring-indigo-500 focus:border-indigo-500 outline-none">
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-1">Desporto</label>
                        <select id="activityType" onchange="updateDefaults()"
                            class="w-full px-3 py-2 border border-gray-300 rounded-md focus:ring-indigo-500 focus:border-indigo-500 outline-none">
                            <option value="9">Corrida</option>
                            <option value="1">Ciclismo</option>
                            <option value="17">Caminhada</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-1">Privacidade</label>
                        <select id="visibility"
                            class="w-full px-3 py-2 border border-gray-300 rounded-md focus:ring-indigo-500 focus:border-indigo-500 outline-none">
                            <option value="everyone">Público (Todos)</option>
                            <option value="followers">Seguidores</option>
                            <option value="only_me">Privado (Só Eu)</option>
                        </select>
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Ritmo Alvo (Pace)</label>
                    <div class="flex items-center space-x-2">
                        <input type="number" id="paceMin" value="5" min="0" max="60" onchange="updateEstimatedTime()"
                            class="w-20 px-3 py-2 border border-gray-300 rounded-md focus:ring-indigo-500 focus:border-indigo-500 outline-none text-center">
                        <span class="text-gray-500 font-bold">:</span>
                        <input type="number" id="paceSec" value="30" min="0" max="59" onchange="updateEstimatedTime()"
                            class="w-20 px-3 py-2 border border-gray-300 rounded-md focus:ring-indigo-500 focus:border-indigo-500 outline-none text-center">
                        <span class="text-sm text-gray-500">min/km</span>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-1">Freq. Cardíaca (bpm)</label>
                        <input type="number" id="heartRate" value="155" min="60" max="200"
                            class="w-full px-3 py-2 border border-gray-300 rounded-md focus:ring-indigo-500 focus:border-indigo-500 outline-none">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-1">Cadência (Passos)</label>
                        <input type="number" id="cadence" value="165" min="40" max="200"
                            class="w-full px-3 py-2 border border-gray-300 rounded-md focus:ring-indigo-500 focus:border-indigo-500 outline-none">
                    </div>
                </div>

                <div class="space-y-4 pt-3 border-t border-gray-200 mt-2">
                    <div>
                        <div class="flex justify-between items-center mb-1">
                            <label class="block text-sm font-semibold text-gray-700">Variação de Pace</label>
                            <span id="paceVarValue" class="text-sm font-bold text-indigo-600">10%</span>
                        </div>
                        <input type="range" id="paceVariation" min="0" max="40" value="10" class="w-full accent-indigo-600" oninput="document.getElementById('paceVarValue').innerText = this.value + '%'">
                    </div>
                    
                    <div>
                        <div class="flex justify-between items-center mb-1">
                            <label class="block text-sm font-semibold text-gray-700">Variação Cardíaca</label>
                            <span id="hrVarValue" class="text-sm font-bold text-indigo-600">±10 bpm</span>
                        </div>
                        <input type="range" id="hrVariation" min="0" max="30" value="10" class="w-full accent-indigo-600" oninput="document.getElementById('hrVarValue').innerText = '±' + this.value + ' bpm'">
                    </div>
                </div>

                <div class="flex items-center pt-2">
                    <input type="checkbox" id="addNoise" checked
                        class="h-4 w-4 text-indigo-600 focus:ring-indigo-500 border-gray-300 rounded cursor-pointer">
                    <label for="addNoise" class="ml-2 block text-sm text-gray-700 cursor-pointer">
                        Micro-ruído GPS (Otimizado para Segmentos)
                    </label>
                </div>
            </div>

            <!-- Resumo da Rota -->
            <div class="grid grid-cols-2 gap-4 bg-gray-100 rounded-lg p-4 text-center mt-auto">
                <div>
                    <p class="text-xs text-gray-500 uppercase tracking-wider font-semibold">Distância</p>
                    <p class="text-2xl font-bold text-gray-800" id="distanceDisplay">0.00 <span
                            class="text-sm text-gray-500 font-normal">km</span></p>
                </div>
                <div>
                    <p class="text-xs text-gray-500 uppercase tracking-wider font-semibold">Tempo Exato</p>
                    <p class="text-2xl font-bold text-gray-800" id="timeDisplay">00:00:00</p>
                </div>
            </div>

            <!-- Botões -->
            <div class="flex flex-col gap-2">
                <!-- Botão Strava (Novo) -->
                <button id="stravaBtn" onclick="handleStravaAction()"
                    class="w-full bg-[#FC4C02] hover:bg-[#E34402] text-white font-bold py-3 px-4 rounded-lg transition-colors shadow-md flex justify-center items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"></path><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"></path></svg>
                    Conectar com Strava
                </button>
                
                <!-- Botão Baixar (Antigo) -->
                <button id="downloadBtn" onclick="generateAndDownloadGPX()"
                    class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 px-4 rounded-lg transition-colors shadow-md flex justify-center items-center gap-2 opacity-50 cursor-not-allowed"
                    disabled>
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
                        <polyline points="7 10 12 15 17 10" />
                        <line x1="12" y1="15" x2="12" y2="3" />
                    </svg>
                    Baixar Arquivo GPX
                </button>
                
                <div class="flex gap-2">
                    <button onclick="undoLastPoint()"
                        class="w-1/2 bg-white hover:bg-gray-100 text-gray-600 border border-gray-300 font-semibold py-2 px-2 rounded-lg transition-colors flex justify-center items-center gap-1 text-sm">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M3 7v6h6" />
                            <path d="M21 17a9 9 0 0 0-9-9 9 9 0 0 0-6 2.3L3 13" />
                        </svg>
                        Desfazer
                    </button>
                    <button onclick="clearRoute()"
                        class="w-1/2 bg-white hover:bg-red-50 text-red-600 border border-gray-300 font-semibold py-2 px-2 rounded-lg transition-colors flex justify-center items-center gap-1 text-sm">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="3 6 5 6 21 6" />
                            <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2" />
                        </svg>
                        Limpar
                    </button>
                </div>
            </div>

        </div>
    </aside>

    <!-- Mapa -->
    <main class="flex-grow h-1/2 md:h-full relative">
        <div id="map" class="w-full h-full"></div>
    </main>

    <script>
        // ======= LÓGICA DO STRAVA =======
        let stravaAccessToken = localStorage.getItem('strava_access_token');
        
        async function handleStravaAuthReturn() {
            const urlParams = new URLSearchParams(window.location.search);
            const code = urlParams.get('code');
            
            if (code) {
                // O usuário acabou de voltar da tela de login do Strava
                const clientId = localStorage.getItem('strava_client_id');
                const clientSecret = localStorage.getItem('strava_client_secret');
                
                try {
                    const response = await fetch('https://www.strava.com/oauth/token', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            client_id: clientId,
                            client_secret: clientSecret,
                            code: code,
                            grant_type: 'authorization_code'
                        })
                    });
                    const data = await response.json();
                    if(data.access_token) {
                        stravaAccessToken = data.access_token;
                        localStorage.setItem('strava_access_token', stravaAccessToken);
                        alert("Conectado ao Strava com sucesso!");
                    }
                } catch(e) {
                    alert("Erro ao validar login do Strava.");
                }
                
                // Limpa a URL para ficar bonita novamente
                window.history.replaceState({}, document.title, window.location.pathname);
            }
            updateStravaButtonUI();
        }

        function updateStravaButtonUI() {
            const btn = document.getElementById('stravaBtn');
            if (stravaAccessToken) {
                btn.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg> Publicar no Strava`;
                if(currentRouteCoordinates.length < 2) {
                    btn.classList.add('opacity-50', 'cursor-not-allowed');
                } else {
                    btn.classList.remove('opacity-50', 'cursor-not-allowed');
                }
            } else {
                btn.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"></path><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"></path></svg> Conectar com Strava`;
            }
        }

        async function handleStravaAction() {
            if (!stravaAccessToken) {
                // Iniciar fluxo de Login
                let clientId = localStorage.getItem('strava_client_id');
                let clientSecret = localStorage.getItem('strava_client_secret');
                
                const currentDomain = window.location.hostname; // Lê o domínio onde o site está rodando

                if (!clientId || !clientSecret) {
                    clientId = prompt(`MUITO IMPORTANTE: No painel do Strava (strava.com/settings/api), coloque EXATAMENTE isto no campo "Authorization Callback Domain":\n\n${currentDomain}\n\nAgora, insira aqui o seu 'Client ID':`);
                    
                    if(!clientId) return; // Cancelou
                    
                    clientSecret = prompt("Agora insira o seu 'Client Secret':");
                    if(!clientSecret) return;
                    
                    localStorage.setItem('strava_client_id', clientId.trim());
                    localStorage.setItem('strava_client_secret', clientSecret.trim());
                }
                
                const redirectUri = encodeURIComponent(window.location.href.split('?')[0]);
                const authUrl = `https://www.strava.com/oauth/authorize?client_id=${clientId}&response_type=code&redirect_uri=${redirectUri}&approval_prompt=force&scope=activity:write,read`;
                
                // Pergunta se o usuário quer resetar caso a URL dê erro
                if(confirm("Vamos redirecionar para o Strava.\n\nSe aparecer a mensagem 'Bad Request' no ecrã preto, é porque o domínio no painel do Strava não está igual a '"+currentDomain+"'.\n\nQuer prosseguir? (Cancele se precisar resetar as credenciais digitadas)")) {
                    window.location.href = authUrl;
                } else {
                    localStorage.removeItem('strava_client_id');
                    localStorage.removeItem('strava_client_secret');
                    alert("Credenciais resetadas! Tente clicar em Conectar novamente.");
                }
                
            } else {
                // Já conectado, fazer o Upload
                if (currentRouteCoordinates.length < 2) {
                    alert("Desenhe uma rota primeiro!");
                    return;
                }
                
                const btn = document.getElementById('stravaBtn');
                const originalText = btn.innerHTML;
                btn.innerHTML = `A Publicar...`;
                btn.disabled = true;

                const gpxString = generateGPXString();
                const name = document.getElementById('activityName').value || 'Atividade Falsa';
                const description = document.getElementById('activityDescription').value || '';
                const isCommute = document.getElementById('isCommute').checked ? 'true' : 'false';
                const isTrainer = document.getElementById('isTrainer').checked ? 'true' : 'false';
                const visibility = document.getElementById('visibility').value || 'everyone';
                
                const formData = new FormData();
                const blob = new Blob([gpxString], { type: 'application/gpx+xml' });
                formData.append('file', blob, 'fakemyrun.gpx');
                formData.append('name', name);
                formData.append('description', description);
                formData.append('trainer', isTrainer);
                formData.append('commute', isCommute);
                formData.append('data_type', 'gpx');
                formData.append('external_id', 'fakemyrun_' + Date.now() + '.gpx');
                
                // Configurar a privacidade enviada para o Strava
                if (visibility === 'only_me') {
                    formData.append('private', '1');
                } else {
                    formData.append('private', '0');
                }
                // Muitos endpoints modernos do Strava aceitam visibility no form data
                formData.append('visibility', visibility);

                try {
                    const response = await fetch('https://www.strava.com/api/v3/uploads', {
                        method: 'POST',
                        headers: { 'Authorization': 'Bearer ' + stravaAccessToken },
                        body: formData
                    });
                    
                    if(response.status === 401) {
                        // Token expirado
                        localStorage.removeItem('strava_access_token');
                        stravaAccessToken = null;
                        alert("Sessão expirada. Por favor, conecte novamente.");
                        updateStravaButtonUI();
                    } else if (response.ok) {
                        alert("Sucesso! A sua atividade foi enviada para o Strava.");
                    } else {
                        const err = await response.json();
                        alert("Erro ao enviar: " + (err.message || 'Desconhecido'));
                    }
                } catch(e) {
                    alert("Erro de conexão ao enviar para o Strava.");
                }
                
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        }
        // ================================

        // Inicialização
        document.addEventListener('DOMContentLoaded', () => {
            const now = new Date();
            now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
            document.getElementById('startTime').value = now.toISOString().slice(0, 16);
            
            // Processa o retorno do login do Strava
            handleStravaAuthReturn();
        });

        // Variáveis globais
        let map;
        let routingControl;
        let currentRouteCoordinates = [];
        let totalDistanceKm = 0;

        // Inicializar o Mapa Leaflet
        map = L.map('map').setView([-23.5505, -46.6333], 13); // Default: São Paulo

        // Camadas de mapa
        const cartoLightLayer = L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', { maxZoom: 20 });
        const cartoDarkLayer = L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', { maxZoom: 20 });
        const topoLayer = L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png', { maxZoom: 17 });
        const osmLayer = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19 });
        const satelliteLayer = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', { maxZoom: 19 });

        cartoLightLayer.addTo(map);

        L.control.layers({
            "Strava Style (Claro)": cartoLightLayer,
            "Strava Style (Escuro)": cartoDarkLayer,
            "Terreno (Trilhas)": topoLayer,
            "Padrão (Ruas)": osmLayer,
            "Satélite": satelliteLayer
        }).addTo(map);

        if ("geolocation" in navigator) {
            navigator.geolocation.getCurrentPosition(position => {
                map.setView([position.coords.latitude, position.coords.longitude], 14);
            });
        }

        async function searchLocation() {
            const input = document.getElementById('searchInput');
            const query = input.value.trim();
            if (!query) return;

            const btn = input.nextElementSibling;
            const originalIcon = btn.innerHTML;
            btn.innerHTML = '<svg class="animate-spin h-4 w-4 text-indigo-700" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>';

            try {
                const response = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}&limit=1`);
                const data = await response.json();

                if (data && data.length > 0) {
                    map.setView([parseFloat(data[0].lat), parseFloat(data[0].lon)], 14);
                }
            } catch (error) {
                alert('Erro ao pesquisar a localidade.');
            } finally {
                btn.innerHTML = originalIcon;
            }
        }

        routingControl = L.Routing.control({
            waypoints: [],
            routeWhileDragging: true,
            addWaypoints: false,
            fitSelectedRoutes: false,
            show: false,
            router: L.Routing.osrmv1({
                serviceUrl: 'https://routing.openstreetmap.de/routed-foot/route/v1',
                profile: 'driving'
            }),
            lineOptions: {
                styles: [{ color: '#fc4c02', opacity: 0.8, weight: 6, lineJoin: 'round', lineCap: 'round' }]
            },
            createMarker: function (i, wp, nWps) {
                return L.marker(wp.latLng, {
                    draggable: true,
                    icon: L.divIcon({ className: 'bg-white border-4 border-indigo-600 rounded-full w-4 h-4', iconSize: [16, 16], iconAnchor: [8, 8] })
                });
            }
        }).addTo(map);

        map.on('click', function (e) {
            let waypoints = routingControl.getWaypoints().filter(wp => wp.latLng);
            waypoints.push(L.Routing.waypoint(e.latlng));
            routingControl.setWaypoints(waypoints);
        });

        routingControl.on('routesfound', function (e) {
            const routes = e.routes;
            if (routes.length > 0) {
                currentRouteCoordinates = routes[0].coordinates;
                totalDistanceKm = routes[0].summary.totalDistance / 1000;
                document.getElementById('distanceDisplay').innerHTML = `${totalDistanceKm.toFixed(2)} <span class="text-sm text-gray-500 font-normal">km</span>`;
                updateEstimatedTime();

                document.getElementById('downloadBtn').disabled = false;
                document.getElementById('downloadBtn').classList.remove('opacity-50', 'cursor-not-allowed');
                updateStravaButtonUI();
            }
        });

        function updateDefaults() {
            const type = document.getElementById('activityType').value;
            let newServiceUrl = 'https://routing.openstreetmap.de/routed-foot/route/v1';

            if (type === "1") { // Ciclismo
                document.getElementById('paceMin').value = 2;
                document.getElementById('paceSec').value = 30;
                document.getElementById('heartRate').value = 145;
                document.getElementById('cadence').value = 85;
                newServiceUrl = 'https://routing.openstreetmap.de/routed-bike/route/v1';
            } else if (type === "17") { // Caminhada
                document.getElementById('paceMin').value = 10;
                document.getElementById('paceSec').value = 0;
                document.getElementById('heartRate').value = 105;
                document.getElementById('cadence').value = 110;
            } else { // Corrida
                document.getElementById('paceMin').value = 5;
                document.getElementById('paceSec').value = 30;
                document.getElementById('heartRate').value = 155;
                document.getElementById('cadence').value = 165;
            }
            updateEstimatedTime();

            if (routingControl.getRouter().options.serviceUrl !== newServiceUrl) {
                routingControl.getRouter().options.serviceUrl = newServiceUrl;
                routingControl.setWaypoints(routingControl.getWaypoints());
            }
        }

        function updateEstimatedTime() {
            if (totalDistanceKm === 0) return;
            const paceMin = parseInt(document.getElementById('paceMin').value) || 0;
            const paceSec = parseInt(document.getElementById('paceSec').value) || 0;
            const totalSecondsPerKm = (paceMin * 60) + paceSec;

            const totalActivitySeconds = Math.round(totalDistanceKm * totalSecondsPerKm);

            const hours = Math.floor(totalActivitySeconds / 3600);
            const minutes = Math.floor((totalActivitySeconds % 3600) / 60);
            const seconds = Math.floor(totalActivitySeconds % 60);

            let timeStr = "";
            if (hours > 0) timeStr += `${hours.toString().padStart(2, '0')}:`;
            timeStr += `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;

            document.getElementById('timeDisplay').innerText = timeStr;
        }

        function undoLastPoint() {
            let waypoints = routingControl.getWaypoints().filter(wp => wp.latLng);
            if (waypoints.length > 0) {
                waypoints.pop();
                routingControl.setWaypoints(waypoints);
                if (waypoints.length < 2) clearRoute();
            }
        }

        function clearRoute() {
            routingControl.setWaypoints([]);
            currentRouteCoordinates = [];
            totalDistanceKm = 0;
            document.getElementById('distanceDisplay').innerHTML = `0.00 <span class="text-sm text-gray-500 font-normal">km</span>`;
            document.getElementById('timeDisplay').innerText = `00:00:00`;

            const btn = document.getElementById('downloadBtn');
            btn.disabled = true;
            btn.classList.add('opacity-50', 'cursor-not-allowed');
            updateStravaButtonUI();
        }

        // --- MOTOR CENTRAL DE GERAÇÃO GPX (Extraído para reutilização) ---
        function generateGPXString() {
            if (currentRouteCoordinates.length < 2) return null;

            const name = document.getElementById('activityName').value || 'Atividade Falsa';
            const startTimeInput = document.getElementById('startTime').value;
            const paceMin = parseInt(document.getElementById('paceMin').value) || 5;
            const paceSec = parseInt(document.getElementById('paceSec').value) || 0;
            const addNoise = document.getElementById('addNoise').checked;
            const activityType = document.getElementById('activityType').value;
            const baseHeartRate = parseInt(document.getElementById('heartRate').value) || 155;
            const baseCadence = parseInt(document.getElementById('cadence').value) || 165;
            const paceVariation = parseInt(document.getElementById('paceVariation').value) || 0;
            const hrVariation = parseInt(document.getElementById('hrVariation').value) || 0;
            const hideHR = document.getElementById('hideHR').checked;

            if (!startTimeInput) return null;

            const startTimeDate = new Date(startTimeInput);
            const paceInSecondsPerKm = (paceMin * 60) + paceSec;
            const speedKmPerSec = 1 / paceInSecondsPerKm;

            const lineCoordinates = currentRouteCoordinates.map(coord => [coord.lng, coord.lat]);
            const routeLine = turf.lineString(lineCoordinates);
            const routeLengthKm = turf.length(routeLine, { units: 'kilometers' });

            let gpxPoints = [];
            let currentElevation = 30 + (Math.random() * 10);
            
            let currentHR = baseHeartRate;
            let targetHR = baseHeartRate;
            let currentCad = baseCadence;
            let totalSeconds = Math.round(routeLengthKm * paceInSecondsPerKm);

            // Lógica de variação de Pace
            let speedFactors = [];
            let currentSpeedFactor = 1.0;
            let targetSpeedFactor = 1.0;
            let variationMax = paceVariation / 100;

            for (let i = 0; i <= totalSeconds; i++) {
                if (i % 60 === 0) { 
                    targetSpeedFactor = 1.0 + (Math.random() - 0.5) * 2 * variationMax;
                }
                currentSpeedFactor += (targetSpeedFactor - currentSpeedFactor) * 0.05; 
                speedFactors.push(currentSpeedFactor);
            }

            let sumFactors = speedFactors.reduce((a, b) => a + b, 0);
            let correction = (totalSeconds + 1) / sumFactors;
            for (let i = 0; i <= totalSeconds; i++) speedFactors[i] *= correction;

            let accumulatedDist = 0;

            for (let sec = 0; sec <= totalSeconds; sec++) {
                accumulatedDist += speedKmPerSec * speedFactors[sec];
                let dist = accumulatedDist;
                if (dist > routeLengthKm || sec === totalSeconds) dist = routeLengthKm;

                const point = turf.along(routeLine, dist, { units: 'kilometers' });
                let lng = point.geometry.coordinates[0];
                let lat = point.geometry.coordinates[1];

                if (addNoise) {
                    lat += (Math.random() - 0.5) * 0.000005; 
                    lng += (Math.random() - 0.5) * 0.000005;
                }

                currentElevation += (Math.random() - 0.5) * 0.2;

                if (sec % 30 === 0) { 
                    targetHR = baseHeartRate + (Math.random() - 0.5) * 2 * hrVariation; 
                }
                currentHR += (targetHR - currentHR) * 0.1;
                let displayHR = currentHR + (Math.random() - 0.5) * 2;
                currentCad = baseCadence + (Math.random() - 0.5) * 4;

                const pointTime = new Date(startTimeDate.getTime() + (sec * 1000));

                gpxPoints.push({
                    lat: lat.toFixed(6),
                    lng: lng.toFixed(6),
                    ele: currentElevation.toFixed(1),
                    hr: hideHR ? null : Math.round(displayHR),
                    cad: Math.round(currentCad),
                    time: pointTime.toISOString()
                });
            }

            return buildGPXString(name, activityType, startTimeDate.toISOString(), gpxPoints);
        }

        // Função original de Download (Mantida)
        function generateAndDownloadGPX() {
            const gpxXML = generateGPXString();
            if(!gpxXML) {
                alert("Erro ao gerar. Verifique se definiu uma data e desenhou a rota.");
                return;
            }
            const name = document.getElementById('activityName').value || 'Atividade Falsa';
            triggerDownload(gpxXML, `${name.replace(/\s+/g, '_')}.gpx`);
        }

        // Montagem do XML GPX
        function buildGPXString(name, type, time, points) {
            let gpx = `<?xml version="1.0" encoding="UTF-8"?>
<gpx creator="FakeMyRun" version="1.1" 
  xmlns="http://www.topografix.com/GPX/1/1" 
  xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance" 
  xmlns:gpxtpx="http://www.garmin.com/xmlschemas/TrackPointExtension/v1"
  xsi:schemaLocation="http://www.topografix.com/GPX/1/1 http://www.topografix.com/GPX/1/1/gpx.xsd http://www.garmin.com/xmlschemas/TrackPointExtension/v1 http://www.garmin.com/xmlschemas/TrackPointExtensionv1.xsd">
  <metadata>
    <time>${time}</time>
  </metadata>
  <trk>
    <name>${name}</name>
    <type>${type}</type>
    <trkseg>\n`;

            points.forEach(p => {
                gpx += `      <trkpt lat="${p.lat}" lon="${p.lng}">
        <ele>${p.ele}</ele>
        <time>${p.time}</time>
        <extensions>
          <gpxtpx:TrackPointExtension>\n`;
                
                if (p.hr !== null) {
                    gpx += `            <gpxtpx:hr>${p.hr}</gpxtpx:hr>\n`;
                }
                
                gpx += `            <gpxtpx:cad>${p.cad}</gpxtpx:cad>
          </gpxtpx:TrackPointExtension>
        </extensions>
      </trkpt>\n`;
            });

            gpx += `    </trkseg>
  </trk>
</gpx>`;
            return gpx;
        }

        function triggerDownload(content, filename) {
            const blob = new Blob([content], { type: 'application/gpx+xml' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.style.display = 'none';
            a.href = url;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            setTimeout(() => {
                document.body.removeChild(a);
                window.URL.revokeObjectURL(url);
            }, 100);
        }
    </script>
</body>
